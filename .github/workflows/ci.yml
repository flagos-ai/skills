name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run skill validation
        run: |
          set +e
          python3 scripts/validate_skills.py > validation-output.txt 2>&1
          exit_code=$?
          cat validation-output.txt

          if [ "$exit_code" -eq 0 ]; then
            echo "## ✅ Skill Validation: All checks passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ Skill Validation: Validation failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat validation-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          exit $exit_code

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff==0.15.10

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        continue-on-error: true
        run: |
          ruff format --check . || echo "::warning::Some files need formatting. Run 'ruff format .' locally."

  lint-shell:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./skills
          severity: error
